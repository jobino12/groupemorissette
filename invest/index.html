<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groupe Morissette — Espace confidentiel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #16243B;
    --gold:   #F0A828;
    --bone:   #EFE9DD;
    --bone-dim: rgba(239,233,221,0.55);
    --border: rgba(239,233,221,0.15);
  }

  body {
    background: var(--navy);
    color: var(--bone);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  #pw-wall {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 340px;
  }

  .pw-logo {
    width: 36px;
    height: 36px;
    background: var(--gold);
    margin-bottom: 28px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .pw-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--bone-dim);
    margin-bottom: 32px;
    text-align: center;
  }

  #pw-input {
    width: 100%;
    padding: 13px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(240,168,40,0.35);
    border-radius: 6px;
    color: var(--bone);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  #pw-input:focus { border-color: var(--gold); }

  #pw-btn {
    width: 100%;
    padding: 13px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #pw-btn:hover { opacity: 0.88; }

  #pw-err {
    margin-top: 12px;
    font-size: 11px;
    color: #ff6b6b;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.2s;
    height: 16px;
  }

  #landing {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 560px;
  }

  .land-logo {
    width: 42px;
    height: 42px;
    background: var(--gold);
    margin-bottom: 20px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  .land-title {
    font-family: 'Big Shoulders Display', sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }

  .land-sub {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--bone-dim);
    margin-bottom: 52px;
    text-align: center;
  }

  .land-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
  }

  .land-card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    padding: 28px 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--bone);
    transition: border-color 0.2s, background 0.2s;
  }
  .land-card:hover {
    border-color: rgba(240,168,40,0.5);
    background: rgba(240,168,40,0.05);
  }

  .card-icon {
    width: 32px;
    height: 32px;
    background: rgba(240,168,40,0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-icon svg { width: 16px; height: 16px; fill: var(--gold); }

  .card-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--bone-dim);
  }

  .card-title {
    font-family: 'Big Shoulders Display', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .card-arrow {
    margin-top: auto;
    font-size: 18px;
    color: var(--gold);
    opacity: 0.7;
  }

  @media (max-width: 500px) {
    .land-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="pw-wall">
  <div class="pw-logo"></div>
  <p class="pw-label">Groupe Morissette · Espace confidentiel</p>
  <input id="pw-input" type="password" placeholder="Mot de passe" autocomplete="current-password" />
  <button id="pw-btn">Accéder</button>
  <div id="pw-err">Mot de passe incorrect</div>
</div>

<div id="landing">
  <div class="land-logo"></div>
  <h1 class="land-title">Groupe Morissette</h1>
  <p class="land-sub">Espace confidentiel · Est. 2026</p>

  <div class="land-cards">
    <a href="investor.html" class="land-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M3 3h18v2H3zm0 4h18v2H3zm0 4h12v2H3zm0 4h8v2H3zm14 0v6l4-3-4-3z"/></svg>
      </div>
      <span class="card-label">Document</span>
      <span class="card-title">Dossier<br>Investisseur</span>
      <span class="card-arrow">→</span>
    </a>
    <a href="playbook.html" class="land-card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zm2 2v12h12V6zm2 2h8v2H8zm0 4h8v2H8zm0 4h5v2H8z"/></svg>
      </div>
      <span class="card-label">Manuel</span>
      <span class="card-title">Playbook<br>Opérationnel</span>
      <span class="card-arrow">→</span>
    </a>
  </div>
</div>

<script>
(function() {
  var PW = 'sesame';
  var KEY = '__gm_invest';

  function unlock() {
    document.getElementById('pw-wall').style.display = 'none';
    document.getElementById('landing').style.display = 'flex';
    sessionStorage.setItem(KEY, '1');
  }

  if (sessionStorage.getItem(KEY) === '1') {
    unlock();
    return;
  }

  document.getElementById('pw-btn').onclick = check;
  document.getElementById('pw-input').onkeydown = function(e) {
    if (e.key === 'Enter') check();
  };

  function check() {
    var val = document.getElementById('pw-input').value;
    var err = document.getElementById('pw-err');
    if (val === PW) {
      unlock();
    } else {
      err.style.opacity = '1';
      document.getElementById('pw-input').value = '';
      setTimeout(function() { err.style.opacity = '0'; }, 2000);
    }
  }
})();
</script>
</body>
</html>
